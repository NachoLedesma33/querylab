# ============================================
# Production Profile — Render / Railway
# ============================================
spring.application.name=querylab
server.port=${PORT:8080}

# H2 In-Memory — isolated per session, no file persist
spring.datasource.url=jdbc:h2:mem:querylab;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Disable H2 console in production
spring.h2.console.enabled=false

# JPA — validate only (schema managed by init scripts)
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# SQL initialization — always run to populate in-memory DB
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
